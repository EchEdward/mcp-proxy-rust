name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: mcp-proxy

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked --all-targets

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_suffix: linux-amd64
            bin_ext: ""
            rustflags: "-C target-feature=+crt-static"
            macos_deployment_target: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-amd64
            bin_ext: .exe
            rustflags: "-C target-feature=+crt-static"
            macos_deployment_target: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            bin_ext: ""
            rustflags: ""
            macos_deployment_target: "11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Validate static Linux binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail

          BIN_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.bin_ext }}"
          file "$BIN_PATH"

          if ldd "$BIN_PATH" 2>&1 | grep -q "not a dynamic executable"; then
            echo "Linux binary is statically linked"
          else
            echo "Linux binary unexpectedly has dynamic dependencies"
            ldd "$BIN_PATH" || true
            exit 1
          fi

      - name: Prepare binary artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          BIN_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.bin_ext }}"
          OUTPUT_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.artifact_suffix }}${{ matrix.bin_ext }}"

          mkdir -p dist
          cp "$BIN_PATH" "dist/${OUTPUT_NAME}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
